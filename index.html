<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary Meta Tags -->
    <title>A Website</title>
    <meta name="title" content="YourName.org" />
    <meta name="description" content="Description Content" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourname.org" />
    <meta property="og:title" content="YourName.org" />
    <meta property="og:description" content="Description Content" />
    <meta property="og:image" content="url" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://yourname.org" />
    <meta property="twitter:title" content="YourName.org" />
    <meta property="twitter:description" content="Description Content" />
    <meta property="twitter:image" content="url" />
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
